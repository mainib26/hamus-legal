<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamus - Legal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans Ethiopic', sans-serif; color: #111827; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #FAFAFA; }
    .container { text-align: center; padding: 40px 20px; }
    .brand { color: #0D9488; font-size: 36px; font-weight: 700; margin-bottom: 8px; }
    .tagline { color: #6B7280; font-size: 16px; margin-bottom: 24px; }
    .lang-switcher { display: flex; justify-content: center; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
    .lang-btn { padding: 6px 16px; border: 1px solid #D1D5DB; border-radius: 20px; background: white; color: #374151; font-size: 14px; font-family: inherit; cursor: pointer; transition: all 0.2s; }
    .lang-btn:hover { border-color: #0D9488; color: #0D9488; }
    .lang-btn.active { background: #0D9488; color: white; border-color: #0D9488; }
    .lang-content { display: none; }
    .lang-content.active { display: block; }
    a { display: block; color: #0D9488; font-size: 18px; font-weight: 500; margin: 12px 0; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">Hamus</div>

    <div class="lang-switcher">
      <button class="lang-btn active" onclick="switchLang('en')">English</button>
      <button class="lang-btn" onclick="switchLang('am')">አማርኛ</button>
      <button class="lang-btn" onclick="switchLang('ti')">ትግርኛ</button>
    </div>

    <div id="content-en" class="lang-content active" lang="en">
      <p class="tagline">Community Marketplace</p>
      <a href="terms.html">Terms of Service</a>
      <a href="privacy.html">Privacy Policy</a>
    </div>

    <div id="content-am" class="lang-content" lang="am">
      <p class="tagline">የማህበረሰብ ገበያ</p>
      <a href="terms.html#am">የአገልግሎት ደንቦች</a>
      <a href="privacy.html#am">የግላዊነት ፖሊሲ</a>
    </div>

    <div id="content-ti" class="lang-content" lang="ti">
      <p class="tagline">ናይ ማሕበረሰብ ገበያ</p>
      <a href="terms.html#ti">ውዕል ኣገልግሎት</a>
      <a href="privacy.html#ti">ፖሊሲ ምስጢራውነት</a>
    </div>
  </div>

  <script>
    function switchLang(lang) {
      document.querySelectorAll('.lang-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.lang-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('content-' + lang).classList.add('active');
      document.querySelector('[onclick="switchLang(\'' + lang + '\')"]').classList.add('active');
      document.documentElement.lang = lang;
    }
    // Auto-detect from hash
    if (window.location.hash) {
      var lang = window.location.hash.replace('#', '');
      if (['en', 'am', 'ti'].indexOf(lang) !== -1) switchLang(lang);
    }
  </script>
</body>
</html>
